<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elite Check-In Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        :root { --accent: #3291ff; --bg: #000; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, system-ui, sans-serif; }
        body { background-color: var(--bg); color: white; height: 100vh; overflow: hidden; display: flex; flex-direction: column; align-items: center; }

        /* Steps */
        .step { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; animation: fadeIn 0.5s ease; }
        .step.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Step 1: Scanner */
        .video-wrapper { width: 280px; height: 280px; border-radius: 60px; overflow: hidden; border: 4px solid rgba(255,255,255,0.1); }
        #video-preview { width: 100%; height: 100%; object-fit: cover; }

        /* Step 3: REAL iOS SEAT PLAN */
        #step-seat { justify-content: flex-start; padding-top: 60px; background: #000; }
        .plane-container { position: relative; width: 340px; display: flex; flex-direction: column; align-items: center; }
        
        /* Die massive Flugzeugnase aus dem Video */
        .plane-body {
            width: 300px; height: 500px;
            background: #111;
            border-radius: 150px 150px 40px 40px;
            position: absolute; top: 0; z-index: 1;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .cockpit-window {
            position: absolute; top: 50px; width: 180px; height: 40px;
            display: flex; justify-content: space-between; z-index: 2;
        }
        .window-part { width: 85px; height: 100%; background: #050505; border-radius: 40% 40% 10% 10%; border: 1px solid rgba(255,255,255,0.05); }

        /* Seat Grid */
        .seat-grid {
            position: relative; z-index: 3; margin-top: 180px;
            display: grid; grid-template-columns: repeat(6, 42px); gap: 10px;
            padding: 20px;
        }

        .seat {
            width: 42px; height: 48px; border: 1.5px solid #222; border-radius: 10px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 10px; color: #444; position: relative; transition: 0.3s;
        }
        .seat span { position: absolute; top: -14px; font-size: 9px; font-weight: bold; }

        /* Der exakte Blaue Glow-Effekt aus dem Bild */
        .seat.selected {
            border-color: var(--accent);
            background: rgba(50, 145, 255, 0.2);
            color: white; font-weight: bold;
            box-shadow: 0 0 20px rgba(50, 145, 255, 0.4);
        }
        .seat.selected::after {
            content: ''; position: absolute; inset: -5px;
            background: var(--accent); filter: blur(15px);
            opacity: 0.3; z-index: -1;
        }

        /* Final Ticket */
        #step-ticket { background: #000; padding: 20px; }
        .ticket { width: 320px; background: white; border-radius: 24px; overflow: hidden; color: black; }
        .t-top { background: #000; color: white; padding: 15px; text-align: center; font-size: 12px; font-weight: bold; }
        .t-content { padding: 25px; }

        canvas { display: none; }
    </style>
</head>
<body>

    <div id="step-scan" class="step active">
        <h2 style="margin-bottom: 30px;">Scan QR Code</h2>
        <div class="video-wrapper"><video id="video-preview" autoplay playsinline></video></div>
        <canvas id="canvas"></canvas>
    </div>

    <div id="step-seat" class="step">
        <h2 style="margin-bottom: 20px; z-index: 10;">Select Your Seat</h2>
        <div class="plane-container">
            <div class="plane-body"></div>
            <div class="cockpit-window">
                <div class="window-part"></div>
                <div class="window-part"></div>
            </div>
            <div class="seat-grid">
                <div class="seat" id="s1A"><span>A</span>1A</div>
                <div class="seat"><span>B</span></div>
                <div class="seat"><span>C</span></div>
                <div class="seat"><span>D</span></div>
                <div class="seat"><span>E</span></div>
                <div class="seat"><span>F</span></div>
                <div class="seat">2A</div><div class="seat"></div><div class="seat"></div><div class="seat"></div><div class="seat"></div><div class="seat"></div>
                <div class="seat">3A</div><div class="seat"></div><div class="seat"></div><div class="seat"></div><div class="seat"></div><div class="seat"></div>
            </div>
        </div>
    </div>

    <div id="step-ticket" class="step">
        <div class="ticket">
            <div class="t-top">BOARDING PASS</div>
            <div class="t-content">
                <div style="display:flex; justify-content:space-between">
                    <span>Passenger: Elite</span>
                    <span>Seat: 1A</span>
                </div>
                <div style="margin-top:20px; font-size:24px; font-weight:bold; display:flex; justify-content:space-between; align-items:center;">
                    <span>FRA</span>
                    <span style="font-size:18px">✈️</span>
                    <span>CDG</span>
                </div>
                <div style="height:40px; background:repeating-linear-gradient(90deg,#000,#000 2px,#fff 2px,#fff 4px); margin-top:20px;"></div>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById("video-preview");
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");

        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }).then(stream => {
            video.srcObject = stream;
            requestAnimationFrame(tick);
        });

        function tick() {
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                canvas.height = video.videoHeight; canvas.width = video.videoWidth;
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                if (jsQR(imageData.data, imageData.width, imageData.height)) {
                    runCheckIn(); return;
                }
            }
            requestAnimationFrame(tick);
        }

        function runCheckIn() {
            if(window.isBusy) return;
            window.isBusy = true;
            
            // Wechsel zu Seats
            document.getElementById('step-scan').classList.remove('active');
            document.getElementById('step-seat').classList.add('active');

            setTimeout(() => {
                // Seat 1A auswählen mit Glow
                document.getElementById('s1A').classList.add('selected');
                
                setTimeout(() => {
                    // Wechsel zu Ticket
                    document.getElementById('step-seat').classList.remove('active');
                    document.getElementById('step-ticket').classList.add('active');
                }, 3000);
            }, 1000);
        }
    </script>
</body>
</html>
