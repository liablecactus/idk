<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Focus Flight Clone</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        :root {
            --accent: #3291ff;
            --bg: #0b0b0b;
            --plane-grey: #1a1a1a;
            --glass: rgba(255, 255, 255, 0.03);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, system-ui, sans-serif; }
        
        body {
            background-color: var(--bg);
            color: white;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Scan Section */
        .step { 
            display: none; width: 100%; height: 100%; 
            flex-direction: column; align-items: center; justify-content: center; 
            animation: fadeIn 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards; 
        }
        .step.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        .scan-btn {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            color: white; padding: 18px 40px; border-radius: 20px; font-weight: 500;
            cursor: pointer; margin-bottom: 40px; backdrop-filter: blur(20px);
            transition: 0.3s; font-size: 15px; letter-spacing: 0.5px;
        }
        .scan-btn:active { transform: scale(0.96); background: rgba(255,255,255,0.1); }

        .preview-box { width: 260px; height: 260px; border-radius: 50px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Focus Flight Seat View */
        #step-seat { justify-content: flex-start; padding-top: 80px; }
        
        .plane-wrapper {
            position: relative;
            width: 320px;
            height: 600px;
            background: var(--plane-grey);
            border-radius: 160px 160px 50px 50px;
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 50px 100px rgba(0,0,0,0.8);
        }

        /* Das Cockpit-Fenster (1:1 Focus Flight Style) */
        .cockpit {
            margin-top: 45px; width: 180px; height: 35px;
            display: flex; justify-content: space-between;
        }
        .window { width: 85px; height: 100%; background: #000; border-radius: 30px 30px 5px 5px; opacity: 0.8; }

        .seat-grid {
            margin-top: 100px;
            display: grid;
            grid-template-columns: repeat(2, 45px) 30px repeat(2, 45px); /* Layout: A B [Gang] C D */
            gap: 12px;
        }

        .seat {
            width: 45px; height: 50px;
            border: 1.5px solid rgba(255,255,255,0.05);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 11px; color: #444; position: relative;
            background: rgba(0,0,0,0.2);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Die Spalten-Labels (A B C D) */
        .seat::after {
            content: attr(data-col);
            position: absolute; top: -18px; font-size: 10px; color: #333; font-weight: 600;
        }

        /* Der pulsierende blaue Glow bei Auswahl */
        .seat.selected {
            background: var(--accent);
            border-color: var(--accent);
            color: white; font-weight: bold;
            box-shadow: 0 0 30px rgba(50, 145, 255, 0.5);
            z-index: 10;
        }

        /* Ticket Step */
        #step-ticket { padding: 20px; }
        .boarding-pass {
            width: 330px; background: white; border-radius: 28px; overflow: hidden; color: black;
            animation: slideUp 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        .pass-header { background: #000; color: white; padding: 20px; text-align: center; font-weight: 700; font-size: 13px; }
        .pass-content { padding: 30px; }
        .info-row { display: flex; justify-content: space-between; margin-bottom: 25px; }
        .label { font-size: 11px; color: #888; text-transform: uppercase; font-weight: 600; margin-bottom: 4px; }
        .val { font-size: 18px; font-weight: 800; }

        canvas { display: none; }
    </style>
</head>
<body>

    <div id="step-scan" class="step active">
        <button class="scan-btn" onclick="runSequence()">Boarding Pass scannen</button>
        <div class="preview-box">
            <video id="video" autoplay playsinline></video>
        </div>
        <canvas id="canvas"></canvas>
    </div>

    <div id="step-seat" class="step">
        <h2 style="margin-bottom: 40px; font-weight: 600; letter-spacing: -0.5px;">Select Seat</h2>
        <div class="plane-wrapper">
            <div class="cockpit">
                <div class="window"></div>
                <div class="window"></div>
            </div>
            <div class="seat-grid">
                <div class="seat" id="s1A" data-col="A">1A</div>
                <div class="seat" data-col="B"></div>
                <div></div> <div class="seat" data-col="C"></div>
                <div class="seat" data-col="D"></div>
                <div class="seat">2A</div><div class="seat"></div><div></div><div class="seat"></div><div class="seat"></div>
                <div class="seat">3A</div><div class="seat"></div><div></div><div class="seat"></div><div class="seat"></div>
                <div class="seat">4A</div><div class="seat"></div><div></div><div class="seat"></div><div class="seat"></div>
            </div>
        </div>
    </div>

    <div id="step-ticket" class="step">
        <div class="boarding-pass">
            <div class="pass-header">FOCUS FLIGHT BOARDING PASS</div>
            <div class="pass-content">
                <div class="info-row">
                    <div><p class="label">Passenger</p><p class="val">Elite User</p></div>
                    <div style="text-align: right;"><p class="label">Seat</p><p class="val">1A</p></div>
                </div>
                <div class="info-row" style="align-items: center;">
                    <div><p class="label">Origin</p><p class="val">FRA</p></div>
                    <div style="font-size: 22px;">✈️</div>
                    <div style="text-align: right;"><p class="label">Destination</p><p class="val">CDG</p></div>
                </div>
                <div style="height: 50px; background: repeating-linear-gradient(90deg, #000, #000 2px, #fff 2px, #fff 5px); margin-top: 20px; opacity: 0.9;"></div>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById("video");
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");

        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }).then(stream => {
            video.srcObject = stream;
            requestAnimationFrame(tick);
        });

        function tick() {
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                canvas.height = video.videoHeight; canvas.width = video.videoWidth;
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                if (jsQR(imageData.data, imageData.width, imageData.height)) {
                    runSequence(); return;
                }
            }
            requestAnimationFrame(tick);
        }

        function runSequence() {
            if(window.isAnimating) return;
            window.isAnimating = true;

            // Step 1 -> 2
            document.getElementById('step-scan').classList.remove('active');
            document.getElementById('step-seat').classList.add('active');

            setTimeout(() => {
                // Seat auswählen (1:1 Glow Effekt)
                const seat = document.getElementById('s1A');
                seat.classList.add('selected');
                
                // Sound abspielen (Focus Flight Vibe)
                try { new Audio('https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3').play(); } catch(e){}

                setTimeout(() => {
                    // Step 2 -> 3
                    document.getElementById('step-seat').classList.remove('active');
                    document.getElementById('step-ticket').classList.add('active');
                }, 3000);
            }, 1200);
        }
    </script>
</body>
</html>
