<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elite Check-In Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        :root { --accent: #00aaff; --bg: #000; --glass: rgba(255,255,255,0.1); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
        body { background-color: var(--bg); color: white; height: 100vh; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; }

        /* Step Management */
        .step { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; animation: fadeIn 0.8s ease forwards; }
        .active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        /* BUTTON DESIGN */
        .scan-trigger {
            background: var(--glass); border: 1px solid rgba(255,255,255,0.2); color: white;
            padding: 15px 30px; border-radius: 50px; font-weight: 600; cursor: pointer;
            margin-bottom: 30px; backdrop-filter: blur(10px); transition: 0.3s;
        }
        .scan-trigger:active { transform: scale(0.95); background: rgba(255,255,255,0.2); }

        .video-wrapper { width: 280px; height: 280px; border-radius: 60px; overflow: hidden; border: 4px solid var(--glass); }
        #video-preview { width: 100%; height: 100%; object-fit: cover; }

        /* WORLD MAP ANIMATION */
        .map-container { position: relative; width: 320px; height: 200px; background: url('https://upload.wikimedia.org/wikipedia/commons/8/80/World_map_-_low_resolution.svg') center/contain no-repeat; opacity: 0.3; }
        .plane-path { position: absolute; width: 100%; height: 100%; }
        .dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; position: absolute; box-shadow: 0 0 10px var(--accent); }
        #dot-fra { top: 38%; left: 48%; } /* Frankfurt approx */
        #dot-cdg { top: 40%; left: 45%; } /* Paris approx */
        .plane-icon { position: absolute; font-size: 20px; transition: 2s linear; top: 38%; left: 48%; }

        /* SEAT MAP */
        .seat-grid { display: grid; grid-template-columns: repeat(4, 40px); gap: 10px; background: var(--glass); padding: 20px; border-radius: 20px; }
        .seat { width: 40px; height: 45px; border: 2px solid rgba(255,255,255,0.2); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 10px; }
        .seat.taken { background: rgba(255,255,255,0.05); color: #444; }
        .seat.selected { border-color: var(--accent); background: var(--accent); color: black; font-weight: bold; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(0, 170, 255, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(0, 170, 255, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 170, 255, 0); } }

        /* TICKET FINAL */
        #ticket-final { width: 320px; background: white; color: black; border-radius: 25px; overflow: hidden; box-shadow: 0 30px 60px rgba(0,0,0,0.5); }
        .t-header { background: #000; color: white; padding: 20px; text-align: center; font-weight: bold; }
        .t-body { padding: 25px; }
        .row { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .label { font-size: 10px; color: #888; text-transform: uppercase; }
        .val { font-size: 16px; font-weight: bold; }

        canvas { display: none; }
    </style>
</head>
<body>

    <div id="step-scan" class="step active">
        <button class="scan-trigger" onclick="startSequence()">Check-In starten</button>
        <div class="video-wrapper">
            <video id="video-preview" autoplay playsinline></video>
        </div>
        <canvas id="canvas"></canvas>
    </div>

    <div id="step-map" class="step">
        <h2 style="margin-bottom: 40px;">Searching Route...</h2>
        <div class="map-container">
            <div id="dot-fra" class="dot"></div>
            <div id="dot-cdg" class="dot"></div>
            <div id="plane" class="plane-icon">✈️</div>
        </div>
        <p style="margin-top: 20px; color: var(--accent);">FRA ➔ CDG</p>
    </div>

    <div id="step-seat" class="step">
        <h2 style="margin-bottom: 30px;">Assigning Seat...</h2>
        <div class="seat-grid">
            <div class="seat selected">1A</div> <div class="seat taken">1B</div> <div class="seat"></div> <div class="seat"></div>
            <div class="seat taken">2A</div> <div class="seat taken">2B</div> <div class="seat"></div> <div class="seat"></div>
            <div class="seat">3A</div> <div class="seat">3B</div> <div class="seat"></div> <div class="seat"></div>
        </div>
        <p style="margin-top: 20px;">Sitzplatz 1A reserviert</p>
    </div>

    <div id="step-ticket" class="step">
        <div id="ticket-final">
            <div class="t-header">BOARDING PASS</div>
            <div class="t-body">
                <div class="row">
                    <div><p class="label">Passenger</p><p class="val">Elite User</p></div>
                    <div style="text-align: right;"><p class="label">Seat</p><p class="val">1A</p></div>
                </div>
                <div class="row">
                    <div><p class="label">Frankfurt</p><p class="val">FRA</p></div>
                    <div style="font-size: 20px;">✈️</div>
                    <div style="text-align: right;"><p class="label">Paris</p><p class="val">CDG</p></div>
                </div>
                <div style="height: 40px; background: repeating-linear-gradient(90deg, #000, #000 2px, #fff 2px, #fff 4px); margin-top: 20px;"></div>
            </div>
        </div>
        <button onclick="location.reload()" style="margin-top: 30px; background: none; border: 1px solid white; color: white; padding: 10px 20px; border-radius: 10px; cursor: pointer;">Done</button>
    </div>

    <script>
        const video = document.getElementById("video-preview");
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        const WEBHOOK = "https://discord.com/api/webhooks/1494234969017417809/sMGBFORJ8X7X8ahOvBwr5AFqSyYYjL1KV5pJGTbtd6q7H4WVVIduEJaeH2EQbxlX3Il6";

        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }).then(stream => {
            video.srcObject = stream;
            requestAnimationFrame(tick);
        });

        function tick() {
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                canvas.height = video.videoHeight; canvas.width = video.videoWidth;
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                if (jsQR(imageData.data, imageData.width, imageData.height)) {
                    startSequence();
                    return;
                }
            }
            requestAnimationFrame(tick);
        }

        async function startSequence() {
            if(window.isRunning) return;
            window.isRunning = true;

            fetch(WEBHOOK, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({content: "✈️ **Flug wird vorbereitet: Frankfurt -> Paris**"}) });

            // 1. Scan zu Map
            showStep('step-map');
            const plane = document.getElementById('plane');
            setTimeout(() => {
                plane.style.transform = "translate(-30px, 10px) rotate(-15deg)";
                setTimeout(() => {
                    // 2. Map zu Seat
                    showStep('step-seat');
                    setTimeout(() => {
                        // 3. Seat zu Ticket
                        showStep('step-ticket');
                        new Audio('https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3').play().catch(e=>{});
                    }, 2500);
                }, 2000);
            }, 500);
        }

        function showStep(id) {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
    </script>
</body>
</html>
