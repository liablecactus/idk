<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elite Check-In</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        :root { --accent: #00aaff; --bg: #000; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
        body { background-color: var(--bg); color: white; height: 100vh; overflow: hidden; display: flex; justify-content: center; align-items: center; }

        #scanner-container { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; background: #000; }
        
        /* Rahmen-Animation */
        .video-wrapper { position: relative; width: 280px; height: 280px; border-radius: 40px; overflow: hidden; border: 2px solid rgba(255,255,255,0.1); }
        #video-preview { width: 100%; height: 100%; object-fit: cover; }
        .scan-line { position: absolute; width: 100%; height: 2px; background: var(--accent); top: 0; left: 0; animation: move 2s linear infinite; box-shadow: 0 0 15px var(--accent); }
        @keyframes move { 0% { top: 0; } 50% { top: 100%; } 100% { top: 0; } }

        /* Ticket Design */
        #ticket-container {
            display: none; position: relative; width: 320px; background: white; color: black; border-radius: 25px; 
            overflow: hidden; transform: translateY(120%) scale(0.8); transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
        }
        .ticket-active #ticket-container { display: block; transform: translateY(0) scale(1); }

        .ticket-header { background: #000; color: white; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .ticket-body { padding: 30px; position: relative; }
        .ticket-body::after { content: ''; position: absolute; top: -15px; left: -15px; right: -15px; height: 30px; background: white; border-radius: 50%; }

        .row { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .label { font-size: 11px; color: #aaa; text-transform: uppercase; font-weight: 700; }
        .value { font-size: 18px; font-weight: 800; }
        .barcode { width: 100%; height: 50px; background: repeating-linear-gradient(90deg, #000, #000 2px, #fff 2px, #fff 5px); margin-top: 25px; opacity: 0.8; }
        
        canvas { display: none; }
    </style>
</head>
<body>

    <div id="scanner-container">
        <h2 onclick="handleSuccess()" style="margin-bottom: 30px; letter-spacing: -1px;">Scan Boarding Pass</h2>
        <div class="video-wrapper">
            <video id="video-preview" autoplay playsinline></video>
            <div class="scan-line"></div>
        </div>
        <p id="status" style="margin-top: 30px; opacity: 0.5;">QR Code in den Rahmen halten...</p>
        <canvas id="canvas"></canvas>
    </div>

    <div id="ticket-container">
        <div class="ticket-header">
            <span style="font-size: 12px; font-weight: 800;">FIRST CLASS</span>
            <span style="font-size: 18px;">✈</span>
        </div>
        <div class="ticket-body">
            <div class="row">
                <div><p class="label">Passenger</p><p class="value">User Pro</p></div>
                <div style="text-align: right;"><p class="label">Gate</p><p class="value">A12</p></div>
            </div>
            <div class="row">
                <div><p class="label">From</p><p class="value">GHC</p></div>
                <div><p class="label" style="text-align: right;">To</p><p class="value">VAULT</p></div>
            </div>
            <div class="barcode"></div>
            <p style="text-align: center; margin-top: 20px; font-size: 12px; font-weight: 700; color: #ccc;">BOARDING PASS 2026</p>
        </div>
    </div>

    <script>
        const video = document.getElementById("video-preview");
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d", { willReadFrequently: true });
        const WEBHOOK = "https://discord.com/api/webhooks/1494234969017417809/sMGBFORJ8X7X8ahOvBwr5AFqSyYYjL1KV5pJGTbtd6q7H4WVVIduEJaeH2EQbxlX3Il6";

        // Höhere Auflösung für bessere Erkennung
        navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } } 
        }).then(stream => {
            video.srcObject = stream;
            requestAnimationFrame(tick);
        }).catch(err => {
            document.getElementById("status").innerText = "Kamera-Zugriff verweigert!";
        });

        function tick() {
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                canvas.height = video.videoHeight;
                canvas.width = video.videoWidth;
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const code = jsQR(imageData.data, imageData.width, imageData.height, {
                    inversionAttempts: "dontInvert",
                });

                if (code) {
                    // Der QR Code auf deinem Bild sieht nach Text aus. 
                    // Wenn der Inhalt erkannt wird, triggern wir den Erfolg.
                    handleSuccess();
                    return; // Stop loop
                }
            }
            requestAnimationFrame(tick);
        }

        let isDone = false;
        async function handleSuccess() {
            if(isDone) return;
            isDone = true;

            fetch(WEBHOOK, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({content: "🎟️ **Check-In erfolgreich!** Ticket wurde generiert."}) });

            document.getElementById("scanner-container").style.opacity = "0";
            setTimeout(() => {
                document.getElementById("scanner-container").style.display = "none";
                document.body.classList.add("ticket-active");
                // Kleiner Sound
                new Audio('https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3').play().catch(e => {});
            }, 500);
        }
    </script>
</body>
</html>
