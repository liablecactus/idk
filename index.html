<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Focus Flight 1:1</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        :root { --accent: #3291ff; --bg: #000; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, system-ui, sans-serif; }
        body { background: var(--bg); color: white; height: 100vh; overflow: hidden; display: flex; flex-direction: column; align-items: center; }

        .step { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; opacity: 0; transition: 0.8s ease; }
        .step.active { display: flex; opacity: 1; }

        /* Step 1: Scanner */
        .scan-trigger {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white;
            padding: 18px 40px; border-radius: 24px; font-weight: 600; cursor: pointer;
            margin-bottom: 50px; backdrop-filter: blur(20px); transition: 0.3s;
        }

        /* Step 2: 3D Earth */
        #globe-container { width: 100%; height: 60%; position: relative; }
        .route-info { position: absolute; bottom: 20px; width: 100%; text-align: center; font-size: 24px; font-weight: 800; letter-spacing: 2px; }

        /* Step 3: Ultra Clean Seat Plan */
        .plane-vessel {
            width: 320px; height: 550px; background: #0a0a0a; border-radius: 160px 160px 60px 60px;
            position: relative; border: 1px solid rgba(255,255,255,0.03); display: flex; flex-direction: column; align-items: center;
        }
        .cockpit-ios { margin-top: 50px; width: 160px; height: 30px; display: flex; justify-content: space-between; }
        .window-ios { width: 75px; height: 100%; background: #000; border-radius: 40px 40px 5px 5px; box-shadow: inset 0 0 10px rgba(255,255,255,0.05); }

        .seat-grid { margin-top: 100px; display: grid; grid-template-columns: repeat(2, 45px) 25px repeat(2, 45px); gap: 12px; }
        .seat {
            width: 45px; height: 52px; background: rgba(255,255,255,0.02); border: 1px solid #1a1a1a;
            border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 11px; color: #333; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .seat.selected {
            background: var(--accent); border-color: var(--accent); color: white; font-weight: bold;
            box-shadow: 0 0 40px rgba(50, 145, 255, 0.6); transform: scale(1.05);
        }

        /* Step 4: Final Ticket */
        .pass { width: 340px; background: white; border-radius: 30px; color: black; padding: 40px; }
    </style>
</head>
<body>

    <div id="step-scan" class="step active">
        <button class="scan-trigger" onclick="startExperience()">CHECK-IN</button>
        <div style="width:260px; height:260px; border-radius:60px; overflow:hidden; border:1px solid #222;">
            <video id="video" style="width:100%; height:100%; object-fit:cover;" autoplay playsinline></video>
        </div>
        <canvas id="canvas" style="display:none;"></canvas>
    </div>

    <div id="step-world" class="step">
        <div id="globe-container"></div>
        <div class="route-info">FRA <span style="color:var(--accent)">➔</span> CDG</div>
    </div>

    <div id="step-seat" class="step">
        <div class="plane-vessel">
            <div class="cockpit-ios"><div class="window-ios"></div><div class="window-ios"></div></div>
            <div class="seat-grid">
                <div class="seat" id="target-seat">1A</div><div class="seat"></div><div style="width:25px"></div><div class="seat"></div><div class="seat"></div>
                <div class="seat">2A</div><div class="seat"></div><div></div><div class="seat"></div><div class="seat"></div>
                <div class="seat">3A</div><div class="seat"></div><div></div><div class="seat"></div><div class="seat"></div>
            </div>
        </div>
    </div>

    <div id="step-ticket" class="step">
        <div class="pass">
            <p style="font-size:10px; color:#888; letter-spacing:2px;">BOARDING PASS</p>
            <h1 style="margin: 20px 0; font-size:32px;">Elite Flight</h1>
            <div style="display:flex; justify-content:space-between; margin-top:40px;">
                <div><small>FROM</small><br><b>FRANKFURT</b></div>
                <div><small>TO</small><br><b>PARIS</b></div>
            </div>
            <div style="margin-top:30px; border-top:1px dashed #ddd; padding-top:20px; font-weight:bold;">SEAT 1A</div>
        </div>
    </div>

    <script>
        let scene, camera, renderer, globe;

        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / (window.innerHeight*0.6), 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight * 0.6);
            document.getElementById('globe-container').appendChild(renderer.domElement);

            const geometry = new THREE.SphereGeometry(2, 64, 64);
            const material = new THREE.MeshPhongMaterial({
                color: 0x111111,
                emissive: 0x222222,
                wireframe: true,
            });
            globe = new THREE.Mesh(geometry, material);
            scene.add(globe);

            const light = new THREE.PointLight(0x3291ff, 2, 100);
            light.position.set(5, 5, 5);
            scene.add(light);
            camera.position.z = 5;

            function animate() {
                requestAnimationFrame(animate);
                globe.rotation.y += 0.005;
                renderer.render(scene, camera);
            }
            animate();
        }

        async function startExperience() {
            showStep('step-world');
            init3D();
            
            setTimeout(() => {
                showStep('step-seat');
                setTimeout(() => {
                    document.getElementById('target-seat').classList.add('selected');
                    setTimeout(() => showStep('step-ticket'), 3000);
                }, 1000);
            }, 4000);
        }

        function showStep(id) {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            const el = document.getElementById(id);
            el.classList.add('active');
        }

        // Camera Logic
        const video = document.getElementById("video");
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }).then(s => video.srcObject = s);
    </script>
</body>
</html>
